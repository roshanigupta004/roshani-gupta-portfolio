<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Operations Dashboard</title>

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#f4f7fb;
}

header{
background:#0f172a;
color:white;
padding:20px;
text-align:center;
}

.dashboard{
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
}

.card h2{
font-size:40px;
margin:10px 0;
color:#2563eb;
}

.card p{
font-size:18px;
color:#666;
}
</style>

</head>

<body>

<header>
<h1>HR Operations Dashboard</h1>
<p>Recruitment Analytics • HR Metrics • Business Operations</p>
</header>

<div class="dashboard">

<div class="card">
<h2>156</h2>
<p>Total Candidates</p>
</div>

<div class="card">
<h2>24</h2>
<p>Open Positions</p>
</div>

<div class="card">
<h2>18</h2>
<p>Offers Released</p>
</div>

<div class="card">
<h2>92%</h2>
<p>Offer Acceptance</p>
</div>

<div class="card">
<h2>14 Days</h2>
<p>Average Time to Hire</p>
</div>

<div class="card">
<h2>96%</h2>
<p>Employee Onboarding</p>
</div>

</div>

</body>
</html>
